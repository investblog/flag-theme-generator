<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f13"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="560" fill="url(#bg)"/>
  <!-- Flag color bars -->
  <g opacity=".15">
    <rect x="0" y="0" width="200" height="560" fill="#009B3A"/>
    <rect x="200" y="0" width="200" height="560" fill="#FEDF00"/>
    <rect x="400" y="0" width="200" height="560" fill="#002776"/>
    <rect x="600" y="0" width="200" height="560" fill="#BF0A30"/>
    <rect x="800" y="0" width="200" height="560" fill="#002868"/>
    <rect x="1000" y="0" width="200" height="560" fill="#FFFFFF" opacity=".3"/>
    <rect x="1200" y="0" width="200" height="560" fill="#CE1126"/>
  </g>
  <!-- Title -->
  <text x="700" y="240" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="700" fill="#e8e8ec">Flag Theme Generator</text>
  <text x="700" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#9898a8">Browser themes inspired by country flags</text>
  <!-- Badges -->
  <text x="700" y="380" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#6366f1">198 countries  ·  Dark / Light / AMOLED  ·  WCAG accessible  ·  Free</text>
  <!-- Browser icons hint -->
  <text x="700" y="440" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#9898a8">Chrome  ·  Firefox  ·  Edge  ·  Brave</text>
</svg>
